<!DOCTYPE html>
<html>
<head>
  <title>Music Library Pro</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h1>🎵 Music Library Pro</h1>

<div class="controls">
  <input id="search" placeholder="Search songs...">
  
  <select id="genre">
    <option>All</option>
    <option>Romantic</option>
    <option>Pop</option>
    <option>Sad</option>
  </select>
</div>

<h2>Tracks</h2>
<div id="tracks" class="grid"></div>

<h2>🎧 Playlist</h2>
<ul id="playlist"></ul>

<h2>📊 Analytics</h2>
<canvas id="chart"></canvas>

<script type="module" src="app.js"></script>
</body>
</html>
