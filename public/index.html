<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Library Management System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>Music Library Management System</h1>
    <p id="status">Loading...</p>

    <section class="controls">
      <input id="search" type="text" placeholder="Search by track or artist">
      <select id="genre">
        <option value="All">All Genres</option>
      </select>
    </section>

    <section>
      <h2>Tracks</h2>
      <div id="tracks" class="grid"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
